name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry

      - name: Configure Poetry
        run: poetry config virtualenvs.in-project true

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run tests
        env:
          LLM_PROVIDER: none
          EMBEDDING_BACKEND: hash
          NER_BACKEND: regex
          LOG_FILE: ""
        run: poetry run pytest -q

      - name: Run memory benchmark smoke test
        env:
          LLM_PROVIDER: none
          EMBEDDING_BACKEND: hash
          NER_BACKEND: regex
          LOG_FILE: ""
        run: poetry run python benchmarks/memory_eval/run_benchmark.py --provider fake

      - name: Run SQLite persistence smoke import
        env:
          MEMORY_DATABASE_URL: sqlite:///data/omni_memory.db
          MEMORY_AUDIT_ENABLED: "true"
          MEMORY_AUDIT_AUTO_CREATE: "true"
          LLM_PROVIDER: none
          EMBEDDING_BACKEND: hash
          NER_BACKEND: regex
          LOG_FILE: ""
        run: |
          mkdir -p data
          poetry run python - <<'PY'
          from infra.db.audit_repo import build_audit_repository
          repo = build_audit_repository()
          assert repo is not None
          print('audit repo ok')
          PY
